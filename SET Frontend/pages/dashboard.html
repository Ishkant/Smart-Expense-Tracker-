<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — SpendWise</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 28px; }
    .dashboard-grid .full-width { grid-column: 1 / -1; }
    .chart-card { position: relative; min-height: 280px; }
    .chart-card canvas { max-height: 260px; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .budget-item { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .budget-item:last-child { margin-bottom: 0; }
    .budget-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; }
    .budget-cat { display: flex; align-items: center; gap: 8px; }
    .recent-list { display: flex; flex-direction: column; gap: 0; }
    .recent-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .recent-item:last-child { border-bottom: none; }
    .recent-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .recent-info { flex: 1; min-width: 0; }
    .recent-title { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-cat { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
    .recent-amount { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; flex-shrink: 0; }
    .recent-amount.expense { color: var(--red); }
    .recent-amount.income  { color: var(--green); }
    @media(max-width:900px){ .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <div class="content-area">
        <div class="page-header fade-in">
          <div>
            <h1 class="page-title" id="greetingTitle">Good morning! 👋</h1>
            <p class="page-subtitle" id="greetingSubtitle">Here's your financial overview</p>
          </div>
          <div class="month-selector">
            <button onclick="changeMonth(-1)">‹</button>
            <span class="month-label" id="monthLabel"></span>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <!-- STATS -->
        <div class="stats-grid fade-in fade-in-1">
          <div class="card stat-card green">
            <div class="stat-label">Total Income</div>
            <div class="stat-value green" id="statIncome">—</div>
            <div class="stat-sub">This month</div>
          </div>
          <div class="card stat-card red">
            <div class="stat-label">Total Expenses</div>
            <div class="stat-value red" id="statExpense">—</div>
            <div class="stat-sub">This month</div>
          </div>
          <div class="card stat-card purple">
            <div class="stat-label">Net Savings</div>
            <div class="stat-value purple" id="statSavings">—</div>
            <div class="stat-sub">Income − Expenses</div>
          </div>
          <div class="card stat-card yellow">
            <div class="stat-label">Budgets Active</div>
            <div class="stat-value yellow" id="statBudgets">—</div>
            <div class="stat-sub">Category budgets set</div>
          </div>
        </div>

        <!-- CHARTS + DETAILS -->
        <div class="dashboard-grid fade-in fade-in-2">
          <!-- Category Donut -->
          <div class="card chart-card">
            <div class="section-title">🍩 Spending by Category</div>
            <div id="donutEmpty" class="empty-state" style="display:none; padding:40px 0;">
              <div class="empty-icon">📊</div>
              <p>No expense data this month</p>
            </div>
            <canvas id="donutChart"></canvas>
          </div>

          <!-- Budget Status -->
          <div class="card">
            <div class="section-title">🎯 Budget Status</div>
            <div id="budgetStatus"><div class="loading-overlay"><div class="spinner"></div></div></div>
          </div>

          <!-- Daily Trend -->
          <div class="card chart-card full-width">
            <div class="section-title">📅 Daily Spending Trend</div>
            <canvas id="lineChart"></canvas>
          </div>

          <!-- Recent Transactions -->
          <div class="card full-width">
            <div class="section-title" style="justify-content:space-between;">
              <span>🕐 Recent Transactions</span>
              <a href="expenses.html" style="font-size:0.8rem;color:var(--accent);font-weight:600;">View all →</a>
            </div>
            <div id="recentList"><div class="loading-overlay"><div class="spinner"></div></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    requireAuth();
    renderSidebar('dashboard');

    let currentMonth = new Date().getMonth() + 1;
    let currentYear  = new Date().getFullYear();
    let donutChart, lineChart;

    // Greeting
    const h = new Date().getHours();
    const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetingTitle').textContent = `${greet}, ${getUser()?.name?.split(' ')[0] || 'there'}! 👋`;

    function updateMonthLabel() {
      document.getElementById('monthLabel').textContent = `${getMonthName(currentMonth)} ${currentYear}`;
    }

    function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
      updateMonthLabel();
      loadDashboard();
    }

    async function loadDashboard() {
      try {
        const res = await get(`${API.ANALYTICS}?month=${currentMonth}&year=${currentYear}`);
        const d = res.data;

        document.getElementById('statIncome').textContent   = formatCurrency(d.totalIncome);
        document.getElementById('statExpense').textContent  = formatCurrency(d.totalExpense);
        document.getElementById('statSavings').textContent  = formatCurrency(d.savings);
        document.getElementById('statBudgets').textContent  = d.budgetStatus?.length || 0;

        renderDonut(d.categoryBreakdown);
        renderLine(d.dailyExpenses);
        renderBudgetStatus(d.budgetStatus);
      } catch(e) { showToast('Failed to load analytics', 'error'); }

      try {
        const res = await get(`${API.EXPENSES_MONTH}?month=${currentMonth}&year=${currentYear}`);
        renderRecent(res.data?.slice(0, 6) || []);
      } catch(e) {}
    }

    function renderDonut(catData) {
      const ctx = document.getElementById('donutChart');
      const labels = Object.keys(catData || {});
      const vals   = Object.values(catData || {});
      if (!labels.length) {
        ctx.style.display = 'none';
        document.getElementById('donutEmpty').style.display = 'block';
        return;
      }
      ctx.style.display = ''; document.getElementById('donutEmpty').style.display = 'none';
      if (donutChart) donutChart.destroy();
      donutChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: vals, backgroundColor: CATEGORY_COLORS, borderWidth: 2, borderColor: '#141720' }] },
        options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#9BA3BF', font: { family: 'DM Sans', size: 12 }, padding: 16 } } }, cutout: '65%' }
      });
    }

    function renderLine(dailyData) {
      const ctx = document.getElementById('lineChart');
      if (lineChart) lineChart.destroy();
      const labels = (dailyData || []).map(d => `Day ${d.day}`);
      const vals   = (dailyData || []).map(d => d.amount);
      lineChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ label: 'Daily Spending', data: vals, borderColor: '#6C63FF', backgroundColor: 'rgba(108,99,255,0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#6C63FF', pointRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#5C6480' }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: '#5C6480', callback: v => getCurrencySymbol() + v.toLocaleString() }, grid: { color: 'rgba(255,255,255,0.05)' } } } }
      });
    }

    function renderBudgetStatus(budgets) {
      const el = document.getElementById('budgetStatus');
      if (!budgets?.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><p>No budgets set</p></div>'; return; }
      el.innerHTML = budgets.slice(0,5).map(b => `
        <div class="budget-item">
          <div class="budget-row">
            <div class="budget-cat"><span>${CATEGORY_ICONS[b.category] || '📦'}</span><span style="font-size:.875rem;font-weight:500;">${b.category}</span></div>
            <span class="badge badge-${b.status.toLowerCase()}">${b.status}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill progress-${b.status.toLowerCase()}" style="width:${Math.min(b.percentageUsed,100).toFixed(0)}%"></div></div>
          <div class="budget-row" style="font-size:.75rem;color:var(--text3);">
            <span>${formatCurrency(b.spent)} spent</span>
            <span>${b.percentageUsed.toFixed(0)}% of ${formatCurrency(b.limitAmount)}</span>
          </div>
        </div>`).join('');
    }

    function renderRecent(expenses) {
      const el = document.getElementById('recentList');
      if (!expenses.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">💸</div><p>No transactions this month</p></div>'; return; }
      el.innerHTML = `<div class="recent-list">${expenses.map(e => `
        <div class="recent-item">
          <div class="recent-icon">${CATEGORY_ICONS[e.category] || '📦'}</div>
          <div class="recent-info">
            <div class="recent-title">${e.title}</div>
            <div class="recent-cat">${e.category} · ${formatDate(e.date)}</div>
          </div>
          <div class="recent-amount ${e.type.toLowerCase()}">${e.type === 'EXPENSE' ? '-' : '+'}${formatCurrency(e.amount)}</div>
        </div>`).join('')}</div>`;
    }

    updateMonthLabel();
    loadDashboard();
  </script>
</body>
</html>
