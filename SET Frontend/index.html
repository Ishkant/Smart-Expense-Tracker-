<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Expense Tracker — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); overflow: hidden; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(108,99,255,0.15), transparent); top: -100px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(45,212,160,0.1), transparent); bottom: -80px; right: -80px; }

    .auth-container { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 20px; }
    .auth-brand { text-align: center; margin-bottom: 32px; }
    .auth-brand .brand-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--green)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 16px; box-shadow: 0 12px 32px rgba(108,99,255,0.4); }
    .auth-brand h1 { font-size: 1.7rem; font-weight: 800; background: linear-gradient(135deg, var(--text), var(--text2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-brand p { color: var(--text3); font-size: 0.9rem; margin-top: 4px; }

    .auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 32px; box-shadow: var(--shadow); }
    .auth-tabs { display: flex; background: var(--bg3); border-radius: 10px; padding: 4px; margin-bottom: 28px; gap: 4px; }
    .auth-tab { flex: 1; padding: 10px; border-radius: 7px; border: none; background: transparent; color: var(--text2); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
    .auth-tab.active { background: var(--accent); color: #fff; }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-form .btn { margin-top: 4px; justify-content: center; padding: 14px; font-size: 1rem; }

    .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="auth-container fade-in">
    <div class="auth-brand">
      <div class="brand-icon">💰</div>
      <h1>Smart Expense Tracker</h1>
      <p>Track. Budget. Grow.</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Login</button>
        <button class="auth-tab" onclick="showTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Login to Dashboard</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form" style="display:none;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="regName" class="form-input" placeholder="Your Name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Min 6 characters" required minlength="6"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Currency</label>
            <select id="regCurrency" class="form-select">
              <option value="INR">₹ INR</option>
              <option value="USD">$ USD</option>
              <option value="EUR">€ EUR</option>
              <option value="GBP">£ GBP</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Monthly Budget</label>
            <input type="number" id="regBudget" class="form-input" placeholder="50000" min="0"/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="regBtn">Create Account</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = 'pages/dashboard.html';

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
      document.getElementById('loginForm').style.display    = tab === 'login'    ? 'flex' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const res = await post(API.LOGIN, {
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        });
        saveAuth(res.data);
        window.location.href = 'pages/dashboard.html';
      } catch(err) {
        showToast(err.message || 'Login failed', 'error');
        btn.disabled = false; btn.textContent = 'Login to Dashboard';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await post(API.REGISTER, {
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          currency: document.getElementById('regCurrency').value,
          monthlyBudget: parseFloat(document.getElementById('regBudget').value) || null
        });
        saveAuth(res.data);
        showToast('Account created! Welcome 🎉', 'success');
        setTimeout(() => window.location.href = 'pages/dashboard.html', 800);
      } catch(err) {
        showToast(err.message || 'Registration failed', 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
